<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive To-Do List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="todo-app">
    <section class="todo-card">
      <div class="card-glow glow-one"></div>
      <div class="card-glow glow-two"></div>

      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fa-solid fa-sun" id="themeIcon"></i>
      </button>

      <header class="todo-header">
        <div>
          <p class="eyebrow">Week 2 · DOM Manipulation</p>
          <h1>Interactive To-Do List</h1>
          <p class="subtitle">Add tasks, manage progress, and filter them live using JavaScript DOM methods.</p>
        </div>
        <div class="header-icon">
          <i class="fa-solid fa-list-check"></i>
        </div>
      </header>

      <form class="todo-form" id="todoForm">
        <div class="input-wrap">
          <i class="fa-solid fa-pen"></i>
          <input type="text" id="taskInput" placeholder="Enter a new task..." autocomplete="off" />
        </div>
        <button type="submit" class="add-btn">
          <i class="fa-solid fa-plus"></i> Add Task
        </button>
      </form>

      <section class="todo-controls">
        <div class="task-status">
          <span id="taskCounter">0 tasks remaining</span>
        </div>
        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
      </section>

      <ul class="todo-list" id="todoList"></ul>

      <div class="empty-state" id="emptyState">
        <i class="fa-regular fa-circle-check"></i>
        <h2>No tasks yet</h2>
        <p>Add your first task to get started.</p>
      </div>

      <footer class="todo-footer">
        <p>Built with HTML, CSS, and JavaScript DOM manipulation.</p>
      </footer>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
